<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="skill-icons/crafting.png">
<title>Gold Benchmark</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="../results/gold/_data.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fff;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 24px 32px;
  }
  .page-header { margin-bottom: 4px; }
  .page-header h1 { font-size: 22px; font-weight: 600; }
  .page-subtitle { font-size: 14px; color: #999; margin-bottom: 20px; }

  .horizon-tabs {
    display: inline-flex;
    gap: 0;
    margin-left: 16px;
    vertical-align: middle;
    flex-wrap: wrap;
  }
  .horizon-tabs button {
    padding: 4px 14px;
    background: #fff;
    border: 1px solid #ddd;
    color: #555;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .horizon-tabs button:first-child { border-radius: 6px 0 0 6px; }
  .horizon-tabs button:last-child { border-radius: 0 6px 6px 0; border-left: none; }
  .horizon-tabs button:not(:first-child):not(:last-child) { border-left: none; }
  .horizon-tabs button.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
  .horizon-tabs button:hover:not(.active) { border-color: #999; color: #1a1a1a; }

  .variant-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 10px 0 18px;
    flex-wrap: wrap;
  }
  .variant-label {
    font-size: 12px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }
  .chart-card {
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    padding: 16px 20px;
  }
  .chart-card h2 {
    font-size: 14px;
    font-weight: 600;
    color: #555;
    margin-bottom: 12px;
  }
  .chart-card canvas {
    width: 100% !important;
    height: 340px !important;
  }

  /* Summary table */
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
  }
  .summary-table th, .summary-table td {
    padding: 10px 16px;
    text-align: left;
    font-size: 13px;
    border-bottom: 1px solid #eee;
  }
  .summary-table th {
    color: #999;
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .summary-table td.gold-cell {
    font-weight: 700;
    font-size: 15px;
    font-variant-numeric: tabular-nums;
  }
  .summary-table td.model-cell {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }
  .summary-table .model-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .summary-table tr.best td { background: #fffde7; }
  .summary-table .rank { color: #bbb; font-weight: 500; min-width: 28px; display: inline-block; }
  .summary-table .token-info { color: #bbb; font-size: 12px; }
  .summary-table .breakdown { color: #999; font-size: 12px; font-weight: 400; }

  .no-data {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 15px;
    flex-direction: column;
    gap: 12px;
  }
  .load-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 12px;
  }
  .load-bar button {
    padding: 8px 18px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    color: #555;
    cursor: pointer;
    font-size: 13px;
  }
  .load-bar button:hover { background: #f5f5f5; border-color: #999; }
  .drop-zone {
    max-width: 500px;
    margin: 0 auto;
    padding: 24px;
    border: 2px dashed #ddd;
    border-radius: 12px;
    text-align: center;
    color: #999;
    font-size: 14px;
    cursor: pointer;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: #4285f4; background: #f0f6ff; }
  .drop-zone input { display: none; }
</style>
</head>
<body>

<div class="page-header">
  <h1>Gold Benchmark</h1>
</div>
<div class="page-subtitle" id="pageSubtitle">Coins earned across AI models</div>

<div id="mainContent" style="display:none">
  <div class="variant-row" id="variantRow" style="display:none">
    <span class="variant-label">Starting condition</span>
    <span class="horizon-tabs" id="conditionTabs"></span>
    <span class="variant-label" style="margin-left:16px">Horizon</span>
    <span class="horizon-tabs" id="horizonTabs"></span>
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <h2>Total Gold Earned</h2>
      <canvas id="barChart"></canvas>
    </div>
    <div class="chart-card">
      <h2>Gold Over Time (Inventory)</h2>
      <canvas id="lineChart"></canvas>
    </div>
  </div>
  <div class="chart-card">
    <h2>Results</h2>
    <table class="summary-table" id="summaryTable">
      <thead>
        <tr>
          <th></th>
          <th>Model</th>
          <th>Gold</th>
          <th>Inventory / Bank</th>
          <th>Total Level</th>
          <th>Tokens</th>
          <th>Cost</th>
          <th>gp / $</th>
        </tr>
      </thead>
      <tbody id="summaryBody"></tbody>
    </table>
  </div>
</div>

<div id="loadSection">
  <div class="load-bar">
    <button onclick="loadResults()" id="loadBtn">Load Results</button>
  </div>
  <div class="drop-zone" id="dropZone">
    <p>Drop _combined.json here or click to browse</p>
    <input type="file" id="fileInput" accept=".json">
  </div>
</div>

<script>
const MODEL_CONFIG = {
  'opus47':     { displayName: 'Claude Opus 4.7',   color: '#6d5843', order: 0.5 },
  'opus':       { displayName: 'Claude Opus 4.6',   color: '#8b7355', order: 1 },
  'opus45':     { displayName: 'Claude Opus 4.5',   color: '#a08060', order: 2 },
  'sonnet46':   { displayName: 'Claude Sonnet 4.6', color: '#d4442a', order: 3 },
  'sonnet45':   { displayName: 'Claude Sonnet 4.5', color: '#e07850', order: 4 },
  'gemini':     { displayName: 'Gemini 3 Pro',      color: '#4285f4', order: 5 },
  'gemini31':   { displayName: 'Gemini 3.1 Pro',    color: '#1a57c4', order: 6 },
  'geminiflash':{ displayName: 'Gemini 3 Flash',    color: '#7baaf7', order: 6.5 },
  'haiku':      { displayName: 'Claude Haiku 4.5',  color: '#e06090', order: 7 },
  'codex':      { displayName: 'Codex 5.2',         color: '#10a37f', order: 8 },
  'codex53':    { displayName: 'Codex 5.3',         color: '#0d8c6b', order: 9 },
  'gpt54':      { displayName: 'GPT-5.4',           color: '#0a7a5a', order: 10 },
  'gpt54mini':  { displayName: 'GPT-5.4 Mini',      color: '#15b886', order: 10.5 },
  'gpt54nano':  { displayName: 'GPT-5.4 Nano',      color: '#20d6a2', order: 10.6 },
  'glm':        { displayName: 'GLM 5',             color: '#6c5ce7', order: 11 },
  'kimi':       { displayName: 'Kimi K2.5',         color: '#00b4d8', order: 12 },
  'qwen3':      { displayName: 'Qwen3 Coder',       color: '#6366f1', order: 13 },
  'qwen35':     { displayName: 'Qwen3.5 35B',       color: '#818cf8', order: 14 },
};

const CONDITION_DISPLAY = {
  'vanilla':     'Vanilla',
  'smith-alch':  'Smith + Alch',
  'fish':        'Fish',
  'fletch-alch': 'Fletch + Alch',
};

let goldData = {};
let currentVariant = null;   // full key, e.g. "smith-alch-15m" or legacy "15m"
let currentCondition = null; // e.g. "smith-alch" (null for legacy-only data)
let currentHorizon = null;   // e.g. "15m"
let barChart = null;
let lineChart = null;

// Parse a variant key into { condition, horizon }.
// "smith-alch-15m" → { condition: "smith-alch", horizon: "15m" }
// "15m"            → { condition: null,         horizon: "15m" }
function parseVariantKey(key) {
  const m = key.match(/^(.+)-(\d+[mh])$/);
  if (m && m[1] !== '') return { condition: m[1], horizon: m[2] };
  return { condition: null, horizon: key };
}

function loadResults() {
  if (window.GOLD_DATA) {
    goldData = window.GOLD_DATA;
    onDataLoaded();
  }
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  for (const file of e.dataTransfer.files) {
    const reader = new FileReader();
    reader.onload = (ev) => { try { goldData = JSON.parse(ev.target.result); onDataLoaded(); } catch {} };
    reader.readAsText(file);
  }
});
fileInput.addEventListener('change', e => {
  for (const file of e.target.files) {
    const reader = new FileReader();
    reader.onload = (ev) => { try { goldData = JSON.parse(ev.target.result); onDataLoaded(); } catch {} };
    reader.readAsText(file);
  }
});

function onDataLoaded() {
  document.getElementById('loadSection').style.display = 'none';
  document.getElementById('mainContent').style.display = '';

  const variants = Object.keys(goldData).sort();
  if (variants.length === 0) return;

  // Split into (condition, horizon) buckets
  const conditions = new Set();
  const horizons = new Set();
  let hasConditionedData = false;
  for (const v of variants) {
    const { condition, horizon } = parseVariantKey(v);
    if (condition) { conditions.add(condition); hasConditionedData = true; }
    horizons.add(horizon);
  }

  const variantRow = document.getElementById('variantRow');
  const condTabs = document.getElementById('conditionTabs');
  const horizonTabs = document.getElementById('horizonTabs');

  const shouldShowTabs = (hasConditionedData && conditions.size > 1) || horizons.size > 1;
  variantRow.style.display = shouldShowTabs ? '' : 'none';

  if (hasConditionedData && conditions.size > 0) {
    const ordered = ['vanilla', 'smith-alch', 'fish', 'fletch-alch'].filter(c => conditions.has(c));
    for (const c of conditions) if (!ordered.includes(c)) ordered.push(c);
    condTabs.innerHTML = ordered.map(c =>
      `<button data-condition="${c}" onclick="selectCondition('${c}')">${CONDITION_DISPLAY[c] || c}</button>`
    ).join('');
    currentCondition = ordered[0];
  } else {
    condTabs.innerHTML = '';
    currentCondition = null;
  }

  const horizonOrder = Array.from(horizons).sort((a, b) => parseInt(a) - parseInt(b));
  horizonTabs.innerHTML = horizonOrder.map(h =>
    `<button data-horizon="${h}" onclick="selectHorizon('${h}')">${h}</button>`
  ).join('');
  currentHorizon = horizonOrder[0];

  applyVariant();
}

function variantKey() {
  return currentCondition ? `${currentCondition}-${currentHorizon}` : currentHorizon;
}

function applyVariant() {
  currentVariant = variantKey();
  // If the combo doesn't exist in data, pick a fallback that does
  if (!goldData[currentVariant]) {
    const fallback = Object.keys(goldData).find(k => parseVariantKey(k).horizon === currentHorizon);
    if (fallback) {
      currentVariant = fallback;
      const parsed = parseVariantKey(fallback);
      currentCondition = parsed.condition;
    }
  }
  document.querySelectorAll('#conditionTabs button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.condition === currentCondition);
  });
  document.querySelectorAll('#horizonTabs button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.horizon === currentHorizon);
  });
  const condLabel = currentCondition ? `${CONDITION_DISPLAY[currentCondition] || currentCondition} · ` : '';
  document.getElementById('pageSubtitle').textContent = `${condLabel}Coins earned in ${currentHorizon} across AI models`;
  renderAll();
}

function selectCondition(c) { currentCondition = c; applyVariant(); }
function selectHorizon(h)   { currentHorizon = h;   applyVariant(); }

function getModels() {
  const data = goldData[currentVariant] || {};
  return Object.keys(data)
    .sort((a, b) => (data[b]?.gold || 0) - (data[a]?.gold || 0)); // Sort by gold descending
}

function renderAll() {
  renderBarChart();
  renderLineChart();
  renderSummaryTable();
}

function renderBarChart() {
  if (barChart) { barChart.destroy(); barChart = null; }
  const models = getModels();
  const data = goldData[currentVariant] || {};

  const labels = models.map(m => (MODEL_CONFIG[m] || { displayName: m }).displayName);
  const values = models.map(m => data[m]?.gold || 0);
  const colors = models.map(m => (MODEL_CONFIG[m] || { color: '#999' }).color);
  const maxGold = Math.max(...values, 1);

  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors.map(c => hexToRgba(c, 0.75)),
        borderColor: colors,
        borderWidth: 1.5,
        borderRadius: 4,
        barPercentage: 0.7,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600 },
      layout: { padding: { right: 60 } },
      scales: {
        x: {
          min: 0,
          ticks: {
            color: '#999',
            font: { size: 11 },
            callback: v => v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v,
          },
          grid: { color: '#f0f0f0', drawTicks: false },
          border: { color: '#e0e0e0' },
          title: { display: true, text: 'Coins', color: '#999', font: { size: 12 } },
        },
        y: {
          ticks: { color: '#333', font: { size: 12, weight: '500' } },
          grid: { display: false },
          border: { display: false },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: item => `${item.parsed.x.toLocaleString()} gold`,
          },
        },
        // Draw value labels at end of bars
        datalabels: false,
      },
    },
    plugins: [{
      id: 'barLabels',
      afterDraw(chart) {
        const ctx = chart.ctx;
        chart.data.datasets[0].data.forEach((val, i) => {
          const meta = chart.getDatasetMeta(0);
          const bar = meta.data[i];
          if (!bar) return;
          ctx.save();
          ctx.fillStyle = '#555';
          ctx.font = '600 12px -apple-system, sans-serif';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          const label = val >= 1000 ? (val / 1000).toFixed(1) + 'k' : String(val);
          ctx.fillText(label, bar.x + 8, bar.y);
          ctx.restore();
        });
      }
    }],
  });
}

function renderLineChart() {
  if (lineChart) { lineChart.destroy(); lineChart = null; }
  const models = getModels();
  const data = goldData[currentVariant] || {};

  // Parse horizon for max time
  const horizonMatch = (currentHorizon || '').match(/(\d+)(m|h)/);
  const maxMinutes = horizonMatch
    ? (horizonMatch[2] === 'h' ? parseInt(horizonMatch[1]) * 60 : parseInt(horizonMatch[1]))
    : 30;

  const datasets = [];
  for (const model of models) {
    const result = data[model];
    if (!result?.tracking?.samples?.length) continue;
    // Skip if no gold samples (old tracking data without gold field)
    const hasgold = result.tracking.samples.some(s => s.gold != null);
    if (!hasgold) continue;
    const config = MODEL_CONFIG[model] || { displayName: model, color: '#999' };

    const points = [];
    for (const s of result.tracking.samples) {
      const x = s.elapsedMs / 60000;
      if (x > maxMinutes + 2) break;
      if (s.gold != null) points.push({ x, y: s.gold });
    }

    datasets.push({
      label: config.displayName,
      data: points,
      borderColor: config.color,
      backgroundColor: config.color,
      fill: false,
      stepped: 'after',
      pointRadius: 0,
      pointHoverRadius: 3,
      borderWidth: 2,
      tension: 0,
    });
  }

  lineChart = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600 },
      layout: { padding: { top: 8, right: 16, bottom: 2 } },
      interaction: { mode: 'nearest', intersect: false },
      scales: {
        x: {
          type: 'linear',
          min: 0,
          max: maxMinutes,
          ticks: {
            color: '#999',
            font: { size: 11 },
            stepSize: maxMinutes <= 30 ? 5 : (maxMinutes <= 60 ? 10 : 30),
            callback: v => v + ' min',
          },
          grid: { color: '#f0f0f0', drawTicks: false },
          border: { color: '#e0e0e0' },
          title: { display: true, text: 'Elapsed Time', color: '#999', font: { size: 12 } },
        },
        y: {
          min: 0,
          ticks: {
            color: '#999',
            font: { size: 11 },
            maxTicksLimit: 8,
            callback: v => v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v,
          },
          grid: { color: '#f0f0f0', drawTicks: false },
          border: { color: '#e0e0e0' },
          title: { display: true, text: 'Coins (Inventory)', color: '#999', font: { size: 12 } },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => items[0] ? `${items[0].parsed.x.toFixed(1)} min` : '',
            label: item => `${item.dataset.label}: ${item.parsed.y.toLocaleString()} gp`,
          },
        },
      },
    },
  });
}

function renderSummaryTable() {
  const models = getModels();
  const data = goldData[currentVariant] || {};
  const tbody = document.getElementById('summaryBody');

  const maxGold = Math.max(...models.map(m => data[m]?.gold || 0), 1);

  tbody.innerHTML = models.map((model, i) => {
    const r = data[model];
    if (!r) return '';
    const config = MODEL_CONFIG[model] || { displayName: model, color: '#999' };
    const isBest = r.gold === maxGold && r.gold > 0;
    const tokens = r.tokenUsage;
    const tokenStr = tokens
      ? `${(tokens.inputTokens / 1000).toFixed(0)}k in / ${(tokens.outputTokens / 1000).toFixed(0)}k out`
      : '-';
    const cost = tokens?.costUsd;
    const costStr = cost != null ? (cost >= 1 ? `$${cost.toFixed(2)}` : `$${cost.toFixed(3)}`) : '-';
    const gpPerDollar = cost != null && cost > 0 && r.gold > 0
      ? Math.round(r.gold / cost).toLocaleString()
      : '-';
    const medal = i === 0 && r.gold > 0 ? ' \u2B50' : '';

    return `<tr class="${isBest ? 'best' : ''}">
      <td><span class="rank">${i + 1}.</span></td>
      <td class="model-cell">
        <span class="model-dot" style="background:${config.color}"></span>
        ${config.displayName}${medal}
      </td>
      <td class="gold-cell" style="color:${config.color}">
        ${r.gold.toLocaleString()}
        ${r.finalGold != null && r.finalGold !== r.gold ? `<div class="breakdown">final: ${r.finalGold.toLocaleString()}</div>` : ''}
      </td>
      <td class="breakdown">${r.inventoryGold.toLocaleString()} inv / ${r.bankGold.toLocaleString()} bank</td>
      <td>${r.totalLevel}</td>
      <td class="token-info">${tokenStr}</td>
      <td class="token-info">${costStr}</td>
      <td class="token-info">${gpPerDollar}</td>
    </tr>`;
  }).join('');
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Auto-load
loadResults();
</script>
</body>
</html>
