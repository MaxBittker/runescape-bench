<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="skill-icons/crafting.png">
<title>Peak XP Rate Benchmark</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="shared-constants.js"></script>
<script>
  // Parse horizon from URL (default: 30m)
  const params = new URLSearchParams(window.location.search);
  const HORIZON = params.get('horizon') || '30m';
  const HORIZON_MINUTES = parseInt(HORIZON);  // e.g. 30 or 10
</script>
<script>
  // Synchronously load the data file for the selected horizon (works with file://)
  document.write('<script src="../results/skills-' + HORIZON + '/_data.js"></' + 'script>');
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fff;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 24px 32px;
  }
  .page-header { margin-bottom: 4px; }
  .page-header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
  }
  .page-subtitle {
    font-size: 14px;
    color: #999;
    margin-bottom: 16px;
  }
  .page-description {
    font-size: 13px;
    color: #888;
    line-height: 1.6;
    max-width: 720px;
    margin-bottom: 20px;
  }
  .pill-toggle {
    display: inline-flex;
    margin-left: 16px;
    vertical-align: middle;
  }
  .pill-toggle button {
    padding: 4px 14px;
    background: #fff;
    border: 1px solid #ddd;
    color: #555;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    margin-left: -1px;          /* overlap borders so they don't double up */
    position: relative;
  }
  .pill-toggle button:first-child { border-radius: 6px 0 0 6px; margin-left: 0; }
  .pill-toggle button:last-child  { border-radius: 0 6px 6px 0; }
  .pill-toggle button.active {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: #fff;
    z-index: 1;                 /* active border draws on top of neighbors */
  }
  .pill-toggle button:hover:not(.active) { border-color: #999; color: #1a1a1a; z-index: 1; }

  /* Grid view */
  .grid-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .grid-cell {
    border: 1px solid #e8e8e8;
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    height: 220px;
    overflow: visible;
  }
  .grid-cell-title {
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .grid-cell-title img {
    width: 18px;
    height: 18px;
  }
  .grid-cell canvas {
    flex: 1;
    min-height: 0;
  }

  /* Cumulative view */
  .cumulative-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .cumulative-shell {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    gap: 10px;
    align-items: center;
  }
  .cumulative-main {
    min-width: 0;
  }
  .chart-mode-chip {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
    margin-bottom: 8px;
    padding: 0;
    color: #666;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
  }
  .skill-rail {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    align-items: end;
  }
  .skill-rail-reset {
    width: 56px;
    min-height: 28px;
    padding: 4px 6px;
    border: 1px solid #dddddd;
    border-radius: 8px;
    background: #f3f3f3;
    color: #555;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.3;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .skill-rail-reset:hover,
  .skill-rail-reset.active {
    background: #e8e8e8;
    border-color: #cfcfcf;
    color: #333;
  }
  .skill-rail-grid {
    display: grid;
    grid-template-columns: repeat(2, 28px);
    gap: 0;
    justify-content: end;
  }
  .skill-rail-item {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    padding: 0;
    border: none;
    border-radius: 0;
    background: transparent;
    cursor: pointer;
    line-height: 1;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .skill-rail-item:hover,
  .skill-rail-item:focus-visible {
    background: #eef4ff;
    box-shadow: inset 0 0 0 1px #9dbcfb;
  }
  .skill-rail-item.active-soft {
    background: #eef4ff;
    box-shadow: inset 0 0 0 1px #9dbcfb;
  }
  .skill-rail-item.active-hard {
    background: #eaf2ff;
    box-shadow: inset 0 0 0 2px #4f8df7;
  }
  .skill-rail-item:first-child {
    border-top-left-radius: 4px;
  }
  .skill-rail-item:nth-child(2) {
    border-top-right-radius: 4px;
  }
  .skill-rail-item:nth-last-child(2) {
    border-bottom-left-radius: 4px;
  }
  .skill-rail-item:last-child {
    border-bottom-right-radius: 4px;
  }
  .skill-rail-item img {
    width: 18px;
    height: 18px;
    display: block;
  }
  .cumulative-container canvas {
    width: 100% !important;
    max-width: 900px;
    height: 450px !important;
  }

  /* Trajectory steps */
  .traj-step.agent {
    color: #1a1a1a;
    font-size: 14px;
    line-height: 1.65;
    padding: 10px 0;
    white-space: pre-wrap;
  }
  .traj-step.agent + .traj-step.agent {
    border-top: 1px solid #f0f0f0;
  }
  .traj-tool-group {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 4px 0;
  }
  .traj-tool-chip {
    display: inline-block;
    font-family: monospace;
    font-size: 10px;
    color: #aaa;
    background: #f5f5f5;
    border-radius: 3px;
    padding: 1px 6px;
    line-height: 1.5;
  }
  .traj-tool-detail {
    margin: 4px 0;
    border: 1px solid #eee;
    border-radius: 6px;
    overflow: hidden;
  }
  .traj-tool-detail-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: #fafafa;
    cursor: pointer;
    user-select: none;
    font-family: monospace;
    font-size: 11px;
    color: #888;
  }
  .traj-tool-detail-header:hover {
    background: #f0f0f0;
  }
  .traj-tool-detail-toggle {
    font-size: 9px;
    color: #bbb;
    transition: transform 0.15s;
  }
  .traj-tool-detail.open .traj-tool-detail-toggle {
    transform: rotate(90deg);
  }
  .traj-tool-code {
    display: none;
    margin: 0;
    padding: 8px 12px;
    background: #f8f8f8;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.4;
    overflow-x: auto;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre;
    color: #333;
    border-top: 1px solid #eee;
  }
  .traj-tool-detail.open .traj-tool-code {
    display: block;
  }
  .traj-skills-chart-wrap {
    position: relative;
    background: #111;
    border-top: 1px solid #333;
    height: 150px;
    cursor: pointer;
  }
  .traj-skills-chart-wrap canvas {
    width: 100% !important;
    height: 100% !important;
  }

  /* Video + transcript layout */
  .traj-video-container {
    display: flex;
    gap: 0;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .traj-video-pane {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #000;
    border-right: 1px solid #e8e8e8;
  }
  .traj-video-pane video {
    width: 400px;
    height: 300px;
    background: #000;
  }
  .traj-transcript-pane {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    min-width: 0;
  }
  .traj-step.active {
    background: #f0f7ff;
    margin: 0 -24px;
    padding-left: 24px;
    padding-right: 24px;
  }
  .traj-step[data-ts] {
    cursor: pointer;
  }
  .traj-step[data-ts]:hover {
    background: #fafafa;
    margin: 0 -24px;
    padding-left: 24px;
    padding-right: 24px;
  }
  .traj-step.active:hover {
    background: #f0f7ff;
  }
  .traj-tool-group[data-ts] {
    cursor: pointer;
  }
  .traj-timestamp {
    display: inline-block;
    font-family: monospace;
    font-size: 10px;
    color: #999;
    background: #f0f0f0;
    border-radius: 3px;
    padding: 1px 5px;
    margin-right: 6px;
    cursor: pointer;
    vertical-align: middle;
  }
  .traj-timestamp:hover {
    background: #e0e0e0;
    color: #555;
  }

  /* Skill picker */
  .skill-picker-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    padding: 20px 24px;
  }
  .skill-picker-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    transition: border-color 0.15s, background 0.15s;
  }
  .skill-picker-item:hover {
    border-color: #999;
    background: #fafafa;
  }
  .skill-picker-item img {
    width: 16px;
    height: 16px;
  }
  .skill-picker-xp {
    margin-left: auto;
    font-size: 11px;
    font-weight: 400;
    color: #aaa;
  }

  /* Legend */
  .bottom-legend {
    display: flex;
    gap: 8px 14px;
    padding: 16px 0 12px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #555;
    cursor: pointer;
    line-height: 1.2;
  }
  .legend-item.hidden { opacity: 0.35; }
  .legend-label {
    font-weight: 600;
    color: #444;
  }
  .legend-value {
    color: #999;
    font-variant-numeric: tabular-nums;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Load section */
  .no-data {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 15px;
  }
  .load-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 12px;
  }
  .load-bar button {
    padding: 8px 18px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    color: #555;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s, border-color 0.2s;
  }
  .load-bar button:hover { background: #f5f5f5; border-color: #999; }
  .drop-zone {
    max-width: 500px;
    margin: 0 auto;
    padding: 24px;
    border: 2px dashed #ddd;
    border-radius: 12px;
    text-align: center;
    color: #999;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: #4285f4; background: #f0f6ff; }
  .drop-zone input { display: none; }
  .download-btn {
    position: absolute;
    top: 24px;
    right: 32px;
    background: none;
    border: none;
    cursor: pointer;
    color: #999;
    font-size: 18px;
    padding: 4px 8px;
  }
  .download-btn:hover { color: #333; }

  /* Custom tooltip */
  .chart-tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(255,255,255,0.97);
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    padding: 10px 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    color: #333;
    z-index: 2000;
    transition: opacity 0.12s;
    max-width: 260px;
  }
  .chart-tooltip-title {
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chart-tooltip-title img {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }
  .chart-tooltip-avg {
    font-size: 11px;
    color: #666;
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 1px solid #eee;
  }
  .chart-tooltip-skill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 1.5px 0;
    font-size: 11px;
    color: #555;
  }
  .chart-tooltip-skill img {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }
  .chart-tooltip-skill .xp {
    margin-left: auto;
    font-variant-numeric: tabular-nums;
    color: #888;
  }
  .chart-tooltip-skill .xp.zero {
    color: #ccc;
  }

  @media (max-width: 900px) {
    .cumulative-shell {
      grid-template-columns: 1fr;
    }
    .skill-rail-grid {
      grid-template-columns: repeat(6, 28px);
    }
    .skill-rail {
      gap: 5px;
    }
    .skill-rail-item {
      width: 26px;
      height: 26px;
    }
  }

  @media (max-width: 640px) {
    body {
      padding: 20px 16px;
    }
    .skill-rail-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .cumulative-container canvas {
      height: 320px !important;
    }
  }
</style>
</head>
<body>

<div class="page-header">

    <span class="pill-toggle" id="horizonToggle">

  <aside class="skill-rail">
    <button id="skillRailReset" class="skill-rail-reset" onclick="clearActiveSkill()">Total</button>

<!-- Trajectory modal -->
<div id="trajectoryModal" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.45); overflow:auto" onclick="if(event.target===this)closeTrajectory()">
  <div id="trajModalInner" style="max-width:960px; margin:40px auto; background:#fff; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.18); max-height:calc(100vh - 80px); display:flex; flex-direction:column">
    <div id="trajHeader" style="padding:16px 24px; border-bottom:1px solid #e8e8e8; flex-shrink:0">

        <h3 id="trajTitle" style="font-size:16px; font-weight:600; margin:0"></h3>

<!-- Skill picker modal -->
<div id="skillPickerModal" style="display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,0.45); overflow:auto" onclick="if(event.target===this)closeSkillPicker()">
  <div style="max-width:360px; margin:40px auto; background:#fff; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.18); max-height:calc(100vh - 80px); display:flex; flex-direction:column">

<div class="bottom-legend" id="bottomLegend"></div>

<script>
let combinedData = {};
let currentView = 'cumulative';
let useLogScale = false;
let hiddenModels = new Set();
let gridCharts = [];
let cumulativeChart = null;
let pinnedSkill = null;
let hoveredSkill = null;

function getActiveSkill() {
  return hoveredSkill || pinnedSkill;
}

function getActiveSkillLabel() {
  const activeSkill = getActiveSkill();
  return activeSkill ? `${SKILL_DISPLAY[activeSkill] || activeSkill} Peak Rate` : 'Total Peak Rate';
}

// Preload model icons as Image objects for canvas drawing
const modelIconImages = {};
let iconsLoaded = 0;
let iconTotal = 0;
function preloadIcons() {
  for (const [key, config] of Object.entries(MODEL_CONFIG)) {
    if (config.icon) {
      iconTotal++;
      const img = new Image();
      img.onload = () => {
        iconsLoaded++;
        // Once all icons are loaded, redraw all active charts
        if (iconsLoaded >= iconTotal) {
          for (const c of gridCharts) c.draw();
          if (cumulativeChart) cumulativeChart.draw();
        }
      };
      img.src = config.icon;
      modelIconImages[key] = img;
    }
  }
}
preloadIcons();

// Preload skill icons as Image objects for tooltip rendering
const skillIconImages = {};
for (const skill of SKILL_ORDER) {
  const img = new Image();
  img.src = 'skill-icons/' + skill + '.png';
  skillIconImages[skill] = img;
}

// ── Custom HTML Tooltip ──────────────────────────────────────────

let tooltipEl = null;
function getTooltipEl() {
  if (!tooltipEl) {
    tooltipEl = document.createElement('div');
    tooltipEl.className = 'chart-tooltip';
    document.body.appendChild(tooltipEl);
  }
  return tooltipEl;
}

function externalTooltipCumulative(context) {
  const { chart, tooltip } = context;
  const el = getTooltipEl();

  if (tooltip.opacity === 0) {
    el.style.opacity = '0';
    return;
  }

  const item = tooltip.dataPoints?.[0];
  if (!item) return;

  const ds = item.dataset;
  const modelKey = ds._modelKey;
  const config = MODEL_CONFIG[modelKey] || { displayName: modelKey, color: '#999' };
  const minute = Math.floor(item.parsed.x * 10) / 10;
  const rateValue = item.parsed.y;
  const activeSkill = getActiveSkill();

  let html = `<div class="chart-tooltip-title">`;
  if (config.icon) html += `<img src="${config.icon}">`;
  html += `${config.displayName} — ${minute} min</div>`;

  if (activeSkill) {
    const skillName = SKILL_DISPLAY[activeSkill] || activeSkill;
    const iconSrc = 'skill-icons/' + activeSkill + '.png';
    html += `<div class="chart-tooltip-avg">${skillName}: ${formatRate(rateValue)}</div>`;
    html += `<div class="chart-tooltip-skill">`;
    html += `<img src="${iconSrc}">`;
    html += `<span>${skillName}</span>`;
    html += `<span class="xp">${formatRate(rateValue)}</span>`;
    html += `</div>`;
  } else {
    html += `<div class="chart-tooltip-avg">Total: ${formatRate(rateValue)}</div>`;

    const skills = cumulativeSkillPeakRate[modelKey] || [];
    for (const s of skills) {
      const iconSrc = 'skill-icons/' + s.skill + '.png';
      const zeroClass = s.peakRate === 0 ? ' zero' : '';
      html += `<div class="chart-tooltip-skill">`;
      html += `<img src="${iconSrc}">`;
      html += `<span>${s.label}</span>`;
      html += `<span class="xp${zeroClass}">${formatRate(s.peakRate)}</span>`;
      html += `</div>`;
    }
  }

  el.innerHTML = html;
  el.style.opacity = '1';

  // Position relative to the canvas
  const rect = chart.canvas.getBoundingClientRect();
  const caretX = rect.left + window.scrollX + tooltip.caretX;
  const caretY = rect.top + window.scrollY + tooltip.caretY;

  // Flip to left side if too close to right edge
  const tipWidth = el.offsetWidth || 240;
  if (caretX + tipWidth + 16 > window.innerWidth + window.scrollX) {
    el.style.left = (caretX - tipWidth - 12) + 'px';
  } else {
    el.style.left = (caretX + 12) + 'px';
  }
  el.style.top = (caretY - 20) + 'px';
}

function externalTooltipGrid(skill) {
  return function(context) {
    const { chart, tooltip } = context;
    const el = getTooltipEl();

    if (tooltip.opacity === 0) {
      el.style.opacity = '0';
      return;
    }

    const item = tooltip.dataPoints?.[0];
    if (!item) return;

    const ds = item.dataset;
    const modelKey = ds._modelKey;
    const config = MODEL_CONFIG[modelKey] || { displayName: modelKey, color: '#999' };
    const skillName = SKILL_DISPLAY[skill] || skill;
    const iconSrc = 'skill-icons/' + skill + '.png';

    let html = `<div class="chart-tooltip-title">`;
    html += `<img src="${iconSrc}">`;
    const minute = Math.floor(item.parsed.x * 10) / 10;
    html += `${skillName} — ${minute} min</div>`;
    html += `<div class="chart-tooltip-skill" style="padding:2px 0">`;
    if (config.icon) html += `<img src="${config.icon}">`;
    html += `<span>${config.displayName}</span>`;
    html += `<span class="xp">${formatRate(item.parsed.y)}</span>`;
    html += `</div>`;

    el.innerHTML = html;
    el.style.opacity = '1';

    const rect = chart.canvas.getBoundingClientRect();
    const caretX = rect.left + window.scrollX + tooltip.caretX;
    const caretY = rect.top + window.scrollY + tooltip.caretY;

    const tipWidth = el.offsetWidth || 200;
    if (caretX + tipWidth + 16 > window.innerWidth + window.scrollX) {
      el.style.left = (caretX - tipWidth - 12) + 'px';
    } else {
      el.style.left = (caretX + 12) + 'px';
    }
    el.style.top = (caretY - 20) + 'px';
  };
}

function loadResults() {

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  for (const file of e.dataTransfer.files) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try { combinedData = JSON.parse(ev.target.result); onDataLoaded(); } catch {}
    };
    reader.readAsText(file);
  }
});
fileInput.addEventListener('change', e => {
  for (const file of e.target.files) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try { combinedData = JSON.parse(ev.target.result); onDataLoaded(); } catch {}
    };
    reader.readAsText(file);
  }
});

// ── UI ──────────────────────────────────────────────────────────

function onDataLoaded() {
  document.getElementById('loadSection').style.display = 'none';
  document.getElementById('viewToggle').style.display = '';
  renderSkillRail();
  renderLegend();
  renderCurrentView();
}

function setView(view) {
  currentView = view;
  document.querySelectorAll('#viewToggle button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });
  renderCurrentView();
}

function toggleModel(name) {
  if (hiddenModels.has(name)) hiddenModels.delete(name);
  else hiddenModels.add(name);
  renderLegend();
  renderCurrentView();
}

function setPinnedSkill(skill) {
  pinnedSkill = pinnedSkill === skill ? null : skill;
  hoveredSkill = null;
  renderSkillRail();
  renderLegend();
  renderCurrentView();
}

function previewSkill(skill) {
  if (hoveredSkill === skill) return;
  hoveredSkill = skill;
  renderSkillRail();
  renderLegend();
  renderCurrentView();
}

function clearSkillPreview() {
  if (!hoveredSkill) return;
  hoveredSkill = null;
  renderSkillRail();
  renderLegend();
  renderCurrentView();
}

function clearActiveSkill() {
  pinnedSkill = null;
  hoveredSkill = null;
  renderSkillRail();
  renderLegend();
  renderCurrentView();
}

function getModelTotalRate(model) {
  const skills = combinedData[model];
  if (!skills) return 0;
  const rates = Object.values(skills).map(s => s.peakXpRate || 0);
  return rates.reduce((a, b) => a + b, 0);
}

function getModelsInData() {
  return Object.keys(combinedData)
    .sort((a, b) => ((MODEL_CONFIG[a] || {order:99}).order) - ((MODEL_CONFIG[b] || {order:99}).order));
}

function getModelsByPerformance() {
  const activeSkill = getActiveSkill();
  return Object.keys(combinedData)
    .sort((a, b) => {
      const aRate = activeSkill ? (combinedData[a]?.[activeSkill]?.peakXpRate || 0) : getModelTotalRate(a);
      const bRate = activeSkill ? (combinedData[b]?.[activeSkill]?.peakXpRate || 0) : getModelTotalRate(b);
      return bRate - aRate;
    });
}

function renderLegend() {
  const models = currentView === 'cumulative' ? getModelsByPerformance() : getModelsInData();
  const activeSkill = getActiveSkill();
  const el = document.getElementById('bottomLegend');
  el.innerHTML = models.map(name => {
    const config = MODEL_CONFIG[name] || { displayName: name, shortName: name, color: '#999' };
    const isHidden = hiddenModels.has(name);
    const totalRate = activeSkill ? (combinedData[name]?.[activeSkill]?.peakXpRate || 0) : getModelTotalRate(name);
    const showValue = currentView === 'cumulative';
    const totalStr = showValue ? (totalRate > 0 ? formatRate(totalRate) : '-') : '';
    return `<div class="legend-item ${isHidden ? 'hidden' : ''}" onclick="toggleModel('${name}')">
      <div class="legend-dot" style="background:${config.color}"></div>
      <span class="legend-label">${config.shortName || config.displayName}</span>
      ${showValue ? `<span class="legend-value">${totalStr}</span>` : ''}
    </div>`;
  }).join('');
}

function renderCurrentView() {
  // Hide any lingering tooltip
  if (tooltipEl) tooltipEl.style.opacity = '0';

  document.getElementById('gridContainer').style.display = 'none';
  document.getElementById('cumulativeShell').style.display = 'none';

  if (currentView === 'grid') {
    document.getElementById('gridContainer').style.display = 'grid';
    renderGrid();
  } else if (currentView === 'cumulative') {
    document.getElementById('cumulativeShell').style.display = 'grid';
    renderCumulative();
  }
}

function renderSkillRail() {
  const grid = document.getElementById('skillRailGrid');
  const activeSkill = getActiveSkill();
  const label = getActiveSkillLabel();
  if (!grid) return;

  document.getElementById('chartModeChip').textContent = label;
  const resetBtn = document.getElementById('skillRailReset');
  resetBtn.textContent = 'Total';
  resetBtn.classList.toggle('active', activeSkill === null);

  grid.innerHTML = SKILL_ORDER.map(skill => {
    const iconSrc = 'skill-icons/' + skill + '.png';
    const label = SKILL_DISPLAY[skill] || skill;
    const className = [
      'skill-rail-item',
      pinnedSkill === skill ? 'active-hard' : '',
      hoveredSkill === skill ? 'active-soft' : '',
    ].filter(Boolean).join(' ');
    return `<button
      class="${className}"
      title="${label}"
      aria-label="${label}"
      onmouseenter="previewSkill('${skill}')"
      onclick="setPinnedSkill('${skill}')"
    >
      <img src="${iconSrc}" alt="${label}">
    </button>`;
  }).join('');
}

// ── Chart.js plugin: draw model icon at end of each line ────────

const endIconPlugin = {
  id: 'endIcon',
  afterDraw(chart) {
    const ctx = chart.ctx;
    const size = 14;
    const labelGap = 3;
    const minSpacing = 12; // minimum vertical pixels between labels

    // Collect all visible label positions
    const labels = [];
    for (const dataset of chart.data.datasets) {
      if (!dataset._modelKey) continue;
      const meta = chart.getDatasetMeta(chart.data.datasets.indexOf(dataset));
      if (!meta.visible) continue;
      const elements = meta.data;
      if (elements.length === 0) continue;
      const last = elements[elements.length - 1];
      if (!last) continue;

      const config = MODEL_CONFIG[dataset._modelKey] || { shortName: dataset._modelKey, color: '#999' };
      labels.push({
        x: last.x,
        y: last.y,
        drawY: last.y, // will be adjusted for overlap
        modelKey: dataset._modelKey,
        name: config.shortName || config.displayName,
        color: config.color,
      });
    }

    // Sort by y position and push apart overlapping labels
    labels.sort((a, b) => a.y - b.y);
    for (let i = 1; i < labels.length; i++) {
      const gap = labels[i].drawY - labels[i - 1].drawY;
      if (gap < minSpacing) {
        labels[i].drawY = labels[i - 1].drawY + minSpacing;
      }
    }

    // Draw icons and labels
    for (const label of labels) {
      const icon = modelIconImages[label.modelKey];
      ctx.save();
      ctx.globalAlpha = 0.9;
      if (icon && icon.complete) {
        ctx.drawImage(icon, label.x - size / 2, label.y - size / 2, size, size);
      }
      ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillStyle = label.color;
      ctx.textBaseline = 'middle';
      ctx.fillText(label.name, label.x + size / 2 + labelGap, label.drawY);
      ctx.restore();
    }
  }
};

Chart.register(endIconPlugin);

// Store per-model skill datasets for hover reveal
let cumulativeSkillDatasets = {}; // model -> [{label, data, color}, ...]
let cumulativeSkillPeakRate = {}; // model -> [{skill, label, peakRate}, ...] sorted desc

function renderCumulative() {
  if (cumulativeChart) { cumulativeChart.destroy(); cumulativeChart = null; }
  cumulativeSkillDatasets = {};
  cumulativeSkillPeakRate = {};

  const container = document.getElementById('cumulativeContainer');
  container.innerHTML = '';
  document.getElementById('chartModeChip').textContent = getActiveSkillLabel();

  const canvas = document.createElement('canvas');
  container.appendChild(canvas);

  const models = getModelsInData().filter(m => !hiddenModels.has(m));
  const datasets = [];
  const activeSkill = getActiveSkill();
  // For each model, average XP across all 16 skills at each time bucket (1 min intervals)
  const BUCKET_COUNT = HORIZON_MINUTES + 1;

  for (const model of models) {
    const config = MODEL_CONFIG[model] || { displayName: model, color: '#999' };
    let ratePoints = [];

    if (activeSkill) {
      ratePoints = extractPeakRatePoints(combinedData[model]?.[activeSkill], activeSkill, HORIZON_MINUTES);
    } else {
      const bucketSums = new Array(BUCKET_COUNT).fill(0);
      const bucketCounts = new Array(BUCKET_COUNT).fill(0);

      // Collect individual skill peak rate curves for hover reveal
      const skillCurves = [];

      for (const skill of SKILL_ORDER) {
        const points = extractPeakRatePoints(combinedData[model]?.[skill], skill, HORIZON_MINUTES);
        if (points.length === 0) continue;

        const skillBuckets = [];
        for (let min = 0; min < BUCKET_COUNT; min++) {
          let lastRate = 0;
          for (const p of points) {
            if (p.x <= min) lastRate = p.y;
            else break;
          }
          bucketSums[min] += lastRate;
          bucketCounts[min]++;
          skillBuckets.push({ x: min, y: lastRate });
        }

        skillCurves.push({
          label: SKILL_DISPLAY[skill] || skill,
          data: skillBuckets,
        });
      }

      cumulativeSkillDatasets[model] = skillCurves;

      const skillRates = [];
      for (const skill of SKILL_ORDER) {
        const sd = combinedData[model]?.[skill];
        if (sd) skillRates.push({ skill, label: SKILL_DISPLAY[skill] || skill, peakRate: sd.peakXpRate || 0 });
      }
      skillRates.sort((a, b) => b.peakRate - a.peakRate);
      cumulativeSkillPeakRate[model] = skillRates;

      for (let min = 0; min < BUCKET_COUNT; min++) {
        if (bucketCounts[min] > 0) {
          ratePoints.push({ x: min, y: Math.round(bucketSums[min]) });
        }
      }
    }

    datasets.push({
      label: config.displayName,
      data: ratePoints,
      borderColor: config.color,
      backgroundColor: config.color,
      fill: false,
      pointRadius: 0,
      pointHoverRadius: 4,
      borderWidth: 2.5,
      tension: 0,
      _modelKey: model,
      _isAverage: true,
    });
  }

  // Plugin: draw individual skill lines at 50% opacity when hovering a model
  const skillOverlayPlugin = {
    id: 'skillOverlay',
    afterDatasetsDraw(chart) {
      if (!chart._hoveredModel) return;
      const model = chart._hoveredModel;
      const curves = cumulativeSkillDatasets[model];
      if (!curves) return;
      const config = MODEL_CONFIG[model] || { color: '#999' };
      const ctx = chart.ctx;
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;

      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = config.color;
      ctx.lineWidth = 1.2;

      for (const curve of curves) {
        ctx.beginPath();
        let started = false;
        for (const pt of curve.data) {
          const px = xScale.getPixelForValue(pt.x);
          const py = yScale.getPixelForValue(pt.y);
          if (!started) { ctx.moveTo(px, py); started = true; }
          else ctx.lineTo(px, py);
        }
        ctx.stroke();
      }
      ctx.restore();
    }
  };

  cumulativeChart = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    plugins: [skillOverlayPlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      layout: { padding: { top: 10, right: 96, bottom: 2 } },
      interaction: { mode: 'nearest', intersect: false },
      onClick: (event, elements) => {
        if (elements.length > 0) {
          const ds = datasets[elements[0].datasetIndex];
          if (!ds._modelKey) return;
          if (activeSkill) openTrajectory(ds._modelKey, activeSkill);
          else openSkillPicker(ds._modelKey);
        }
      },
      onHover: (event, elements, chart) => {
        const prev = chart._hoveredModel;
        if (elements.length > 0) {
          const ds = chart.data.datasets[elements[0].datasetIndex];
          chart._hoveredModel = ds._modelKey || null;
        } else {
          chart._hoveredModel = null;
        }
        if (chart._hoveredModel !== prev) chart.draw();
      },
      scales: {
        x: {
          type: 'linear',
          min: 0,
          max: HORIZON_MINUTES,
          ticks: { color: '#999', font: { size: 11 }, stepSize: HORIZON_MINUTES <= 10 ? 2 : 5, callback: v => v + ' min' },
          grid: { color: '#f0f0f0', drawTicks: false },
          border: { color: '#e0e0e0' },
          title: { display: true, text: 'Elapsed Time', color: '#999', font: { size: 12 } },
        },
        y: {
          min: 0,
          ticks: {
            color: '#999',
            font: { size: 11, family: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace' },
            maxTicksLimit: 8,
            callback: v => v >= 1000 ? (v / 1000).toFixed(0) + 'k/hr' : v + '/hr',
          },
          grid: { color: '#f0f0f0', drawTicks: false },
          border: { color: '#e0e0e0' },
          title: { display: false },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: false,
          external: externalTooltipCumulative,
        },
      },
    },
  });
}

// Video sync state
let trajVideoOffset = 0; // videoTime = step.ts + trajVideoOffset
let trajVideoReady = false;
let trajUserScrolling = false;
let trajScrollTimer = null;
let trajSamples = []; // tracking samples for skills chart
let trajTargetSkill = ''; // the skill being trained
let trajSkillsChart = null; // Chart.js instance for skill levels
let trajChartDragging = false;
let trajChartMouseUp = null; // stored handler for cleanup

function formatTimestamp(seconds) {
  if (seconds == null || isNaN(seconds) || seconds < 0) return '';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return m + ':' + String(s).padStart(2, '0');
}

// Update all timestamp badges to show video time instead of agent-relative time
function updateBadgeTimestamps() {
  const stepsEl = document.getElementById('trajSteps');
  if (!stepsEl) return;
  const badges = stepsEl.querySelectorAll('.traj-timestamp');
  for (const badge of badges) {
    const stepEl = badge.closest('[data-ts]');
    if (!stepEl) continue;
    const ts = parseFloat(stepEl.dataset.ts);
    if (isNaN(ts)) continue;
    badge.textContent = formatTimestamp(ts + trajVideoOffset);
  }
}

const SKILL_COLORS = {
  attack:'#e04040', defence:'#6090d0', strength:'#40a040', hitpoints:'#d04070',
  ranged:'#50b050', prayer:'#d0d060', magic:'#6060d0', woodcutting:'#8b6040',
  fishing:'#40a0c0', mining:'#a07840', cooking:'#b04080', fletching:'#408060',
  crafting:'#c09040', smithing:'#707070', firemaking:'#e08020', thieving:'#a040a0',
};

function findSkillLevel(sample, skillKey) {
  if (!sample || !sample.skills) return 1;
  const skillName = SKILL_DISPLAY[skillKey] || skillKey;
  for (const [sName, sData] of Object.entries(sample.skills)) {
    if (sName.toLowerCase() === skillKey || sName.toLowerCase() === skillName.toLowerCase()) {
      return sData.level || 1;
    }
  }
  return 1;
}

function getActiveSkills(samples, targetSkill) {
  if (!samples || samples.length === 0) return [targetSkill];
  const firstSample = samples[0];
  const seen = new Set();
  for (let i = 1; i < samples.length; i++) {
    const s = samples[i];
    if (!s.skills) continue;
    for (const sk of SKILL_ORDER) {
      const startLvl = findSkillLevel(firstSample, sk);
      const currLvl = findSkillLevel(s, sk);
      if (currLvl > startLvl) seen.add(sk);
    }
  }
  seen.add(targetSkill);
  return SKILL_ORDER.filter(sk => seen.has(sk));
}

function makeSkillIcon(skill, size) {
  const img = new Image(size, size);
  img.src = 'skill-icons/' + skill + '.png';
  return img;
}

function seekChartToX(canvas, clientX) {
  if (!trajSkillsChart || !trajVideoReady) return;
  const rect = canvas.getBoundingClientRect();
  const area = trajSkillsChart.chartArea;
  const xPx = clientX - rect.left;
  const ratio = (xPx - area.left) / (area.right - area.left);
  if (ratio < 0 || ratio > 1) return;
  const videoEl = document.getElementById('trajVideo');
  if (!videoEl) return;
  const xScale = trajSkillsChart.scales.x;
  const gameMinutes = xScale.min + ratio * (xScale.max - xScale.min);
  videoEl.currentTime = gameMinutes * 60 + trajVideoOffset;
}

function initStatsBar(samples, targetSkill) {
  trajSamples = samples || [];
  trajTargetSkill = targetSkill;
  const wrap = document.getElementById('trajSkillsChartWrap');
  if (!wrap) return;
  if (trajSkillsChart) { trajSkillsChart.destroy(); trajSkillsChart = null; }
  if (trajSamples.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';

  const activeSkills = getActiveSkills(trajSamples, targetSkill);
  const lastElapsed = trajSamples[trajSamples.length - 1].elapsedMs || 1;

  const datasets = activeSkills.map(sk => {
    const color = SKILL_COLORS[sk] || '#888';
    const isTarget = sk === targetSkill;
    return {
      label: SKILL_DISPLAY[sk] || sk,
      _skillKey: sk,
      data: trajSamples.map(s => ({ x: s.elapsedMs / 60000, y: findSkillLevel(s, sk) })),
      borderColor: color,
      backgroundColor: color,
      borderWidth: isTarget ? 2.5 : 1.2,
      pointRadius: 0,
      pointStyle: makeSkillIcon(sk, 14),
      tension: 0,
      order: isTarget ? 0 : 1,
    };
  });

  const canvas = document.getElementById('trajSkillsChart');
  trajSkillsChart = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      scales: {
        x: { type: 'linear', min: 0, max: lastElapsed / 60000,
          title: { display: false },
          ticks: { display: false },
          grid: { color: 'rgba(255,255,255,0.06)' },
        },
        y: { min: 1,
          title: { display: false },
          ticks: { color: '#888', font: { size: 10 } },
          grid: { color: 'rgba(255,255,255,0.06)' },
        },
      },
      plugins: {
        legend: {
          display: true, position: 'right',
          labels: {
            color: '#aaa', font: { size: 9 }, boxWidth: 14, boxHeight: 14, padding: 3,
            usePointStyle: true,
          },
        },
        tooltip: { enabled: false },
      },
      interaction: { mode: 'nearest', intersect: false },
    },
    plugins: [{
      id: 'playhead',
      afterDraw(chart) {
        if (chart._playheadX == null) return;
        const { ctx, chartArea } = chart;
        const x = chart._playheadX;
        if (x < chartArea.left || x > chartArea.right) return;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }
    }],
  });

  // Click + drag on chart scrubs video
  if (trajChartMouseUp) document.removeEventListener('mouseup', trajChartMouseUp);
  trajChartMouseUp = () => { trajChartDragging = false; };
  canvas.addEventListener('mousedown', e => {
    trajChartDragging = true;
    seekChartToX(canvas, e.clientX);
  });
  canvas.addEventListener('mousemove', e => {
    if (trajChartDragging) seekChartToX(canvas, e.clientX);
  });
  document.addEventListener('mouseup', trajChartMouseUp);
}

function updateStatsBar(videoTime) {
  if (!trajSkillsChart || trajSamples.length === 0) return;
  const videoEl = document.getElementById('trajVideo');
  if (!videoEl) return;
  const agentTime = Math.max(0, videoTime - trajVideoOffset);
  const gameMinutes = agentTime / 60;
  const xPixel = trajSkillsChart.scales.x.getPixelForValue(gameMinutes);
  trajSkillsChart._playheadX = xPixel;
  trajSkillsChart.draw();
}

function renderToolStep(step) {
  const label = step.text.replace(/^mcp__rs-agent__/, '').replace(/^mcp__\w+__/, '');
  if (step.detail) {
    // Render as expandable code block
    const tsAttr = step.ts != null ? ` data-ts="${step.ts}"` : '';
    return `<div class="traj-tool-detail"${tsAttr}>` +
      `<div class="traj-tool-detail-header" onclick="this.parentElement.classList.toggle('open')">` +
      `<span class="traj-tool-detail-toggle">&#9654;</span>` +
      `<span>${escapeHtml(label)}</span>` +
      `</div>` +
      `<pre class="traj-tool-code">${escapeHtml(step.detail)}</pre>` +
      `</div>`;
  }
  return null; // no detail — will be batched into chip group
}

function openTrajectory(model, skill) {
  const data = combinedData[model]?.[skill];
  if (!data) return;

  const config = MODEL_CONFIG[model] || { displayName: model, color: '#999' };
  const skillName = SKILL_DISPLAY[skill] || skill;

  document.getElementById('trajTitle').textContent = `${config.displayName} — ${skillName}`;
  document.getElementById('trajSubtitle').textContent =
    `Peak: ${formatRate(data.peakXpRate || 0)} · ${formatXp(data.finalXp)} XP (Lv ${data.finalLevel}) · ${data.jobName || ''}`;

  // Set up video
  const videoPane = document.getElementById('trajVideoPane');
  const videoEl = document.getElementById('trajVideo');
  const modalInner = document.getElementById('trajModalInner');
  const hasVideo = data.videoAvailable && data.trialDir;
  trajVideoReady = false;
  trajVideoOffset = 0;

  if (hasVideo) {
    const videoSrc = '../' + data.trialDir + '/verifier/recording.mp4';
    videoEl.src = videoSrc;
    videoPane.style.display = '';
    modalInner.style.maxWidth = '960px';

    videoEl.onloadedmetadata = function() {
      trajVideoReady = true;
      if (data.containerFinishedAt) {
        const finishedMs = new Date(data.containerFinishedAt).getTime();
        const videoStartWallclock = finishedMs - (videoEl.duration * 1000);
        if (data.agentStartedAt) {
          const agentStartMs = new Date(data.agentStartedAt).getTime();
          trajVideoOffset = (agentStartMs - videoStartWallclock) / 1000;
        }
      }
      // Update badge text to match video timecode
      updateBadgeTimestamps();
    };
    videoEl.onerror = function() {
      videoPane.style.display = 'none';
      modalInner.style.maxWidth = '640px';
      trajVideoReady = false;
    };
  } else {
    videoEl.removeAttribute('src');
    videoEl.load();
    videoPane.style.display = 'none';
    modalInner.style.maxWidth = '640px';
  }

  // Initialize stats bar with tracking samples
  initStatsBar(data.samples, skill);

  // Steps — render agent text, tool chips, and code blocks
  const stepsEl = document.getElementById('trajSteps');
  const steps = data.trajectory || [];
  if (steps.length === 0) {
    stepsEl.innerHTML = '<div style="color:#999; text-align:center; padding:32px">No trajectory data available for this run.</div>';
  } else {
    let html = '';
    let toolBuffer = [];  // steps without detail → chips
    let toolTsBuffer = [];

    function flushTools() {
      if (toolBuffer.length === 0) return;
      const groupTs = toolTsBuffer.find(t => t != null);
      html += `<div class="traj-tool-group"${groupTs != null ? ` data-ts="${groupTs}"` : ''}>`;
      for (const t of toolBuffer) {
        const label = t.replace(/^mcp__rs-agent__/, '').replace(/^mcp__\w+__/, '');
        html += `<span class="traj-tool-chip">${escapeHtml(label)}</span>`;
      }
      html += '</div>';
      toolBuffer = [];
      toolTsBuffer = [];
    }

    for (const step of steps) {
      if (step.source === 'tool') {
        const detailHtml = renderToolStep(step);
        if (detailHtml) {
          // This tool has a code block — flush chip buffer first, then render block
          flushTools();
          html += detailHtml;
        } else {
          toolBuffer.push(step.text);
          toolTsBuffer.push(step.ts);
        }
      } else {
        flushTools();
        const tsAttr = step.ts != null ? ` data-ts="${step.ts}"` : '';
        const tsBadge = step.ts != null
          ? `<span class="traj-timestamp">${formatTimestamp(step.ts)}</span>`
          : '';
        html += `<div class="traj-step agent"${tsAttr}>${tsBadge}${escapeHtml(step.text)}</div>`;
      }
    }
    flushTools();
    stepsEl.innerHTML = html;

    // Click on any step or tool group with a timestamp → seek video
    stepsEl.addEventListener('click', trajStepClickHandler);
  }

  // Set up two-way sync
  if (hasVideo) {
    videoEl.ontimeupdate = function() {
      updateStatsBar(videoEl.currentTime);
      if (trajUserScrolling) return;
      const currentStepTs = videoEl.currentTime - trajVideoOffset;
      highlightAndScrollToStep(stepsEl, currentStepTs, true);
    };

    trajUserScrolling = false;
    stepsEl.addEventListener('scroll', trajScrollHandler);
  }

  document.getElementById('trajectoryModal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function trajStepClickHandler(e) {
  // Don't seek if clicking inside an open code block (allow text selection)
  if (e.target.closest('.traj-tool-code')) return;
  // Toggle code block open/close if clicking header
  if (e.target.closest('.traj-tool-detail-header')) return;
  const target = e.target.closest('[data-ts]');
  if (!target) return;
  const ts = parseFloat(target.dataset.ts);
  if (isNaN(ts)) return;
  seekVideo(ts);
}

function trajScrollHandler() {
  trajUserScrolling = true;
  clearTimeout(trajScrollTimer);
  trajScrollTimer = setTimeout(() => {
    const stepsEl = document.getElementById('trajSteps');
    if (!stepsEl) return;
    const videoEl = document.getElementById('trajVideo');
    if (!videoEl || !trajVideoReady || videoEl.paused === false) {
      trajUserScrolling = false;
      return;
    }
    const containerRect = stepsEl.getBoundingClientRect();
    const allStepEls = stepsEl.querySelectorAll('[data-ts]');
    let topStep = null;
    for (const el of allStepEls) {
      const rect = el.getBoundingClientRect();
      if (rect.top >= containerRect.top - 10) {
        topStep = el;
        break;
      }
    }
    if (topStep) {
      const ts = parseFloat(topStep.dataset.ts);
      if (!isNaN(ts)) {
        const targetTime = ts + trajVideoOffset;
        if (targetTime >= 0 && targetTime <= (videoEl.duration || Infinity)) {
          videoEl.currentTime = targetTime;
        }
        highlightAndScrollToStep(stepsEl, ts, false);
      }
    }
    trajUserScrolling = false;
  }, 150);
}

function highlightAndScrollToStep(stepsEl, currentStepTs, doScroll) {
  const allStepEls = stepsEl.querySelectorAll('[data-ts]');
  let activeEl = null;
  for (const el of allStepEls) {
    el.classList.remove('active');
    const ts = parseFloat(el.dataset.ts);
    if (ts <= currentStepTs) activeEl = el;
  }
  if (activeEl) {
    activeEl.classList.add('active');
    if (doScroll) {
      const paneRect = stepsEl.getBoundingClientRect();
      const elRect = activeEl.getBoundingClientRect();
      const elCenter = elRect.top + elRect.height / 2;
      const paneCenter = paneRect.top + paneRect.height / 2;
      if (Math.abs(elCenter - paneCenter) > paneRect.height * 0.35) {
        activeEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
    }
  }
}

function seekVideo(stepTs) {
  const videoEl = document.getElementById('trajVideo');
  if (!videoEl || !trajVideoReady) return;
  const targetTime = stepTs + trajVideoOffset;
  if (targetTime >= 0 && targetTime <= (videoEl.duration || Infinity)) {
    videoEl.currentTime = targetTime;
  }
  const stepsEl = document.getElementById('trajSteps');
  if (stepsEl) highlightAndScrollToStep(stepsEl, stepTs, false);
}

function closeTrajectory() {
  const videoEl = document.getElementById('trajVideo');
  if (videoEl) {
    videoEl.pause();
    videoEl.ontimeupdate = null;
    videoEl.onloadedmetadata = null;
    videoEl.onerror = null;
  }
  const stepsEl = document.getElementById('trajSteps');
  if (stepsEl) {
    stepsEl.removeEventListener('click', trajStepClickHandler);
    stepsEl.removeEventListener('scroll', trajScrollHandler);
  }
  clearTimeout(trajScrollTimer);
  trajUserScrolling = false;
  trajVideoReady = false;
  if (trajSkillsChart) { trajSkillsChart.destroy(); trajSkillsChart = null; }
  if (trajChartMouseUp) { document.removeEventListener('mouseup', trajChartMouseUp); trajChartMouseUp = null; }
  trajChartDragging = false;
  document.getElementById('trajectoryModal').style.display = 'none';
  document.body.style.overflow = '';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Close modals on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeTrajectory();
    closeSkillPicker();
  }
});

// ── Helpers ─────────────────────────────────────────────────────

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function downloadView() {
  if (currentView === 'grid' && gridCharts.length > 0) {
    const link = document.createElement('a');
    link.download = 'skill-xp-benchmark-grid.png';
    link.href = gridCharts[0].canvas.toDataURL('image/png', 1.0);
    link.click();
  } else if (currentView === 'cumulative' && cumulativeChart) {
    const link = document.createElement('a');
    link.download = 'skill-xp-benchmark-total.png';
    link.href = cumulativeChart.canvas.toDataURL('image/png', 1.0);
    link.click();
  }
}

// ── Horizon switching ────────────────────────────────────────────

function setHorizon(h) {
  if (window.location.protocol === 'file:') {
    // file:// URLs don't support searchParams; rebuild manually
    const base = window.location.pathname;
    window.location = base + '?horizon=' + h;
  } else {
    const url = new URL(window.location);
    url.searchParams.set('horizon', h);
    window.location = url;
  }
}

// Mark the active horizon button
document.querySelectorAll('#horizonToggle button').forEach(btn => {
  btn.classList.toggle('active', btn.dataset.horizon === HORIZON);
});

// Set dynamic title/subtitle based on horizon
document.title = `Peak XP Rate Benchmark (${HORIZON_MINUTES} min)`;
document.getElementById('pageDescription').textContent =
  `Each agent trains a single skill for ${HORIZON_MINUTES} minutes wall clock (8x game speed). ` +
  `Score = peak XP/hr measured in any 15-second window. Best of 1.`;

// Auto-load on page open
loadResults();
</script>
